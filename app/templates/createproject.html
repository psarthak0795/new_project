{% extends "base.html" %}

{% block title %}Add New Project{% endblock %}

{% block projects_active %}active{% endblock %}

{% block extra_styles %}
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.header h1{
    font-size:32px;
    color:#1e293b;
}

.back-btn{
    background:#111827;
    color:white;
    padding:10px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
}

.back-btn:hover{
    background:#374151;
}

.form-card{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
    max-width:900px;
    margin:auto;
}

.form-title{
    font-size:24px;
    margin-bottom:20px;
    color:#1e293b;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.input-group{
    display:flex;
    flex-direction:column;
}

.input-group label{
    margin-bottom:6px;
    font-weight:600;
    color:#334155;
}

.input-group input,
.input-group textarea{
    padding:12px;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:14px;
    outline:none;
}

.input-group input:focus,
.input-group textarea:focus{
    border-color:#4f46e5;
}

.full{
    grid-column:span 2;
}

.save-btn{
    margin-top:25px;
    width:100%;
    padding:14px;
    background:#4f46e5;
    color:white;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.save-btn:hover{
    background:#4338ca;
}

@media(max-width:768px){
    .form-grid{
        grid-template-columns:1fr;
    }

    .full{
        grid-column:span 1;
    }

    .header{
        flex-direction:column;
        align-items:flex-start;
        gap:15px;
    }
}
</style>
{% endblock %}

{% block content %}

<div class="header">
    <h1>Create New Project</h1>
    <a class="back-btn" href="/projects">← Back</a>
</div>

<div class="form-card">

    <div class="form-title">Project Details</div>

    <form method="POST" action="/projects">

        <div class="form-grid">

            <div class="input-group">
                <label>Project Name</label>
                <input type="text" name="project_name" placeholder="Enter project name" required>
            </div>

            <div class="input-group">
                <label>Employee ID</label>
                <input type="number" name="employee_id" placeholder="Enter employee ID" required>
            </div>

            <div class="input-group">
                <label>Start Date</label>
                <input type="date" name="start_date" required>
            </div>

            <div class="input-group">
                <label>End Date</label>
                <input type="date" name="end_date" required>
            </div>

            <div class="input-group full">
                <label>Description</label>
                <textarea rows="4" name="description" placeholder="Write project description..." required></textarea>
            </div>

        </div>

        <button type="submit" class="save-btn">Create Project</button>

    </form>

</div>

{% endblock %}
