<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Portal</title>
    <style>
                    * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: "Segoe UI", sans-serif;
            }

            body {
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background: linear-gradient(135deg, #4f46e5, #7c3aed);
                padding: 20px;
            }

            .container {
                width: 1200px;
                max-width: 100%;
                background: #fff;
                border-radius: 20px;
                overflow: hidden;
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
                position: relative;
            }

            .form-container {
                padding: 40px;
            }

            .login-container {
                display: block;
            }

            .register-container {
                display: none;
            }

            .container.active .login-container {
                display: none;
            }

            .container.active .register-container {
                display: block;
            }

            h1 {
                text-align: center;
                margin-bottom: 30px;
                color: #1e293b;
            }

            .form-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
            }

            .input-group {
                display: flex;
                flex-direction: column;
            }

            .input-group label {
                margin-bottom: 6px;
                font-weight: 600;
                color: #334155;
            }

            .input-group input,
            .input-group select,
            .input-group textarea {
                padding: 12px;
                border: 1px solid #d1d5db;
                border-radius: 10px;
                font-size: 14px;
            }

            .input-group input:focus,
            .input-group select:focus,
            .input-group textarea:focus {
                outline: none;
                border-color: #4f46e5;
            }

            .full-width {
                grid-column: span 3;
            }

            button {
                width: 100%;
                margin-top: 25px;
                padding: 14px;
                border: none;
                border-radius: 10px;
                background: #4f46e5;
                color: #fff;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
            }

            button:hover p {
                text-align: center;
                margin-top: 15px;
            }

            a {
                color: #4f46e5;
                text-decoration: none;
                font-weight: 600;
            }

            .login-container form {
                max-width: 450px;
                margin: auto;
            }

            @media (max-width: 992px) {
                .form-grid {
                    grid-template-columns: repeat(2, 1fr);
                }

                .full-width {
                    grid-column: span 2;
                }
            }

            @media (max-width: 768px) {
                .form-grid {
                    grid-template-columns: 1fr;
                }

                .full-width {
                    grid-column: span 1;
                }

                .form-container {
                    padding: 20px;
                }
            }

    </style>
</head>
<body>

<div class="container" id="container">


<!-- Login Section -->
<div class="form-container login-container">
    <form action="/login" method="post">
        <h1>Login</h1>

        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter Email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter Password" required>
        </div>

        <button type="submit">Login</button>

        <p>
            Don't have an account?
            <a href="#" id="showRegister">Create Account</a>
        </p>
    </form>
</div>

<!-- Register Section -->
<div class="form-container register-container">

    <form action="/authh/register" method="post">
        <h1>Registration</h1>

        <div class="form-grid">

            <div class="input-group">
                <label>First Name</label>
                <input type="text" name="first_name" required>
            </div>

            <div class="input-group">
                <label>Middle Name</label>
                <input type="text" name="middle_name">
            </div>

            <div class="input-group">
                <label>Last Name</label>
                <input type="text" name="last_name" required>
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <div class="input-group">
                <label>Date of Birth</label>
                <input type="date" name="dob" required>
            </div>

            <div class="input-group">
                <label>Gender</label>
                <select name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="input-group full-width">
                <label>Address</label>
                <textarea rows="3" name="address"></textarea>
            </div>

            <div class="input-group">
                <label>Zip Code</label>
                <input type="text" name="zip_code" required>
            </div>

            <div class="input-group">
                <label>City</label>
                <input type="text" name="city" required>
            </div>

            <div class="input-group">
                <label>State</label>
                <input type="text" name="state" required>
            </div>

            <div class="input-group">
                <label>Country</label>
                <input type="text" name="country" required>
            </div>

            <div class="input-group">
                <label>Role</label>
                <select  name="role" required>
                    <option value="">Select Role</option>
                    <option value="employee">Employee</option>
                    <option value="manager">Manager</option>
                </select>
            </div>

            <div class="input-group">
                <label>Designation</label>
                <input type="text"  name="designation" required>
            </div>

            <div class="input-group">
                <label>Date of Joining</label>
                <input type="date"  name="joining_date" required>
            </div>

        </div>

        <button type="submit">Create Account</button>

        <p>
            Already have an account?
            <a href="#" id="showLogin">Login</a>
        </p>

    </form>
</div>


</div>

<script>
const container = document.getElementById('container');
const showRegister = document.getElementById('showRegister');
const showLogin = document.getElementById('showLogin');

showRegister.addEventListener('click', function(e){
    e.preventDefault();
    container.classList.add('active');
});

showLogin.addEventListener('click', function(e){
    e.preventDefault();
    container.classList.remove('active');
});
</script>

</body>
</html>
