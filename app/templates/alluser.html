<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>All Users</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #f4f7fc;
        padding: 20px;
    }

    .top-bar {
        display: flex;
        align-items: center;
        margin-bottom: 15px;
    }

    .back-btn {
        background: #1e293b;
        color: white;
        padding: 8px 14px;
        border-radius: 6px;
        text-decoration: none;
        font-size: 14px;
        transition: 0.3s;
    }

    .back-btn:hover {
        background: #334155;
    }

    .container {
        max-width: 1000px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #1e293b;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        border-radius: 10px;
        overflow: hidden;
    }

    th, td {
        padding: 12px;
        text-align: center;
        border-bottom: 1px solid #e5e7eb;
    }

    th {
        background: #1e293b;
        color: white;
    }

    tr:hover {
        background: #f1f5f9;
    }

    .btn {
        padding: 6px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        margin: 2px;
    }

    .edit { background: #4f46e5; color: white; }
    .delete { background: #ef4444; color: white; }
    .view { background: #10b981; color: white; }

    .role {
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 12px;
        color: white;
    }

    .manager { background: #f59e0b; }
    .employee { background: #3b82f6; }

</style>
</head>

<body>

<div class="top-bar">
    <a href="javascript:history.back()" class="back-btn">⬅ Back</a>
</div>

<div class="container">

    <h2>All Users</h2>

    <script>
        let userRole = "manager"; // employee OR manager
    </script>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>1</td>
                <td>{{ project.project_name }}</td>
                <td>amit@gmail.com</td>
                <td><span class="role manager">Manager</span></td>
                <td>
                    <button class="btn view">View</button>
                    <button class="btn edit manager-btn">Edit</button>
                    <button class="btn delete manager-btn">Delete</button>
                </td>
            </tr>

            <tr>
                <td>2</td>
                <td>Rahul Sharma</td>
                <td>rahul@gmail.com</td>
                <td><span class="role employee">Employee</span></td>
                <td>
                    <button class="btn view">View</button>
                    <button class="btn edit manager-btn">Edit</button>
                    <button class="btn delete manager-btn">Delete</button>
                </td>
            </tr>
        </tbody>
    </table>

</div>

<script>
    if (userRole === "employee") {
        document.querySelectorAll(".manager-btn").forEach(btn => {
            btn.style.display = "none";
        });
    }
</script>

</body>
</html>
