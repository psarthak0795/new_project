{% extends "base.html" %}

{% block title %}Edit Profile{% endblock %}

{% block extra_styles %}
<style>

.page-header{
    display:flex;
    justify-content:flex-start;
    align-items:flex-start;
    position:relative;
    margin-bottom:25px;
    padding-right:180px;
}

.page-header h1{
    color:#1e293b;
    font-size:30px;
}

.back-btn{
    position:absolute;
    top:0;
    right:0;
    text-decoration:none;
    background:black;
    color:white;
    padding:12px 20px;
    border-radius:10px;
    font-weight:600;
}

.back-btn:hover{
    background:#475569;
}

.form-card{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group label{
    margin-bottom:8px;
    font-weight:600;
    color:#334155;
}

.form-group input,
.form-group select,
.form-group textarea{
    padding:12px;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:14px;
    outline:none;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
    border-color:#4f46e5;
}

.full-width{
    grid-column:span 2;
}

textarea{
    min-height:100px;
    resize:none;
}

.update-btn{
    width:100%;
    margin-top:25px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.update-btn:hover{
    background:#4338ca;
}

@media(max-width:768px){

    .form-grid{
        grid-template-columns:1fr;
    }

    .full-width{
        grid-column:span 1;
    }

    .page-header{
        flex-direction:column;
        gap:15px;
        align-items:flex-start;
    }
}

</style>
{% endblock %}

{% block content %}

<div class="page-header">
    <h1>Edit Profile</h1>
    <a href="/users/home" class="back-btn">← Back To Profile</a>
</div>

<div class="form-card">

    <form action="/users/edit/{{ user.id }}" method="POST">

        <div class="form-grid">

            <div class="form-group">
                <label>First Name</label>
                <input
                    type="text"
                    name="first_name"
                    value="{{ user.first_name }}"
                    required>
            </div>

            <div class="form-group">
                <label>Middle Name</label>
                <input
                    type="text"
                    name="middle_name"
                    value="{{ user.middle_name }}">
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input
                    type="text"
                    name="last_name"
                    value="{{ user.last_name }}"
                    required>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input
                    type="text"
                    name="phone"
                    value="{{ user.phone }}"
                    required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input
                    type="email"
                    name="email"
                    value="{{ user.email }}"
                    required>
            </div>

            <div class="form-group">
                <label>Date Of Birth</label>
                <input
                    type="date"
                    name="dob"
                    value="{{ user.dob }}">
            </div>

            <div class="form-group">
                <label>Gender</label>
                <select name="gender">
                    <option value="male" {% if user.gender.value == 'male' %}selected{% endif %}>Male</option>
                    <option value="female" {% if user.gender.value == 'female' %}selected{% endif %}>Female</option>
                    <option value="other" {% if user.gender.value == 'other' %}selected{% endif %}>Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Zip Code</label>
                <input
                    type="text"
                    name="zip_code"
                    value="{{ user.zip_code }}">
            </div>

            <div class="form-group">
                <label>City</label>
                <input
                    type="text"
                    name="city"
                    value="{{ user.city }}">
            </div>

            <div class="form-group">
                <label>State</label>
                <input
                    type="text"
                    name="state"
                    value="{{ user.state }}">
            </div>

            <div class="form-group">
                <label>Country</label>
                <input
                    type="text"
                    name="country"
                    value="{{ user.country }}">
            </div>

            <div class="form-group">
                <label>Designation</label>
                <input
                    type="text"
                    name="designation"
                    value="{{ user.designation }}">
            </div>

            <div class="form-group full-width">
                <label>Address</label>
                <textarea name="address">{{ user.address }}</textarea>
            </div>

        </div>

        <button type="submit" class="update-btn">
            Update Profile
        </button>

    </form>

</div>

{% endblock %}
